name: Build Lava Notes APK
on: 
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci
    - run: npm run build
    - name: Setup Capacitor Android
      uses: 'npx/cap/install-android@5'
      with:
        projectPath: '.'
    - name: Build APK
      run: npx cap build android
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: lavanotes-apk-${{ github.sha }}
        path: android/app/build/outputs/apk/debug/*.apk